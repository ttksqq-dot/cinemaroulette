name: Update Top10

on:
  schedule:
    # 毎週水曜 01:00 UTC = 水曜 10:00 JST (Tudumは火曜更新 → 翌日に実行)
    - cron: '0 1 * * 3'
  workflow_dispatch:   # 手動実行も可能

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4 google-generativeai python-dotenv

      - name: Scrape Tudum
        run: python scripts/scrape_top10.py > data/top10_raw.json

      - name: Build Top10 (Japanese)
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/build_top10.py

      - name: Commit & Push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/top10.json top10.html sitemap.xml
          git diff --staged --quiet || git commit -m "chore: update top10 ($(date -u +%Y-%m-%d))"
          git push
