name: 配信リストを毎日更新

# 実行タイミング
on:
  schedule:
    - cron: '0 21 * * *'   # UTC 21:00 = JST 06:00（主）
    - cron: '30 22 * * *'  # UTC 22:30 = JST 07:30（予備：主が発火しなかった場合）
  workflow_dispatch:   # 手動実行も可能にする（Actionsタブから「Run workflow」ボタン）
    inputs:
      force_service:
        description: '強制取得サービス（空白=通常スケジュール通り）'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - netflix
          - prime

permissions:
  contents: write   # movies.json をコミットするために必要

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存ライブラリをインストール
        run: pip install requests beautifulsoup4

      - name: 配信リストを取得
        env:
          FORCE_SERVICE: ${{ inputs.force_service }}
        run: python scripts/scrape.py

      - name: 変更があればコミット
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/movies.json
          if git diff --staged --quiet; then
            echo "変更なし。コミットをスキップします。"
          else
            git commit -m "chore: 配信リストを自動更新 ($(date -u +%Y-%m-%d))"
            git remote set-url origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git"
            git fetch origin main
            git merge -X ours origin/main --no-edit
            git push
          fi
